services:
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: playenest-dev
      POSTGRES_PASSWORD: playenest-dev-password
      POSTGRES_DB: playenest-db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U playenest-dev -d playenest-db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    restart: always
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    restart: always
    expose:
      - '3000'
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_URL=postgresql://playenest-dev:playenest-dev-password@db:5432/playenest-db
      - REDIS_URL=redis://redis:6379
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET:-your-super-secret-access-jwt-key-at-least-32-chars}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET:-your-super-secret-refresh-jwt-key-at-least-32-chars}
      - JWT_ACCESS_EXPIRES_IN=15m
      - JWT_REFRESH_EXPIRES_IN=7d
      - COOKIE_SECRET=${COOKIE_SECRET:-your-cookie-secret-at-least-10-chars}
      - STATIC_API_KEY=${STATIC_API_KEY:-your-static-api-key-at-least-10-chars}
      - PAYMENT_PROVIDER_WEBHOOK_SECRET=${PAYMENT_PROVIDER_WEBHOOK_SECRET:-your-webhook-secret}
      - RATE_LIMIT_ENABLED=true
      - RATE_LIMIT_STORE=redis
      - MEDIA_STORAGE_DRIVER=local
      - MEDIA_PUBLIC_BASE_URL=http://localhost:3000
      - MEDIA_LOCAL_ROOT=storage
      - MEDIA_LOCAL_PUBLIC_PATH=/media
      - RUN_SEED=true
      - POSTGRES_USER=playenest-dev
      - POSTGRES_PASSWORD=playenest-dev-password
      - POSTGRES_DB=playenest-db
    volumes:
      - app_storage:/app/storage
    command: ["sh", "-c", "./scripts/migrate.sh && node dist/server.js"]

  nginx:
    build:
      context: ./docker/nginx
      dockerfile: Dockerfile
    restart: always
    ports:
      - '80:80'
    environment:
      - MEDIA_LOCAL_PUBLIC_PATH=/media
    volumes:
      - app_storage:/app/storage:ro
    depends_on:
      - app

  backup:
    build:
      context: ./docker/backup
      dockerfile: Dockerfile
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - BACKUP_ENCRYPTION_KEY=${BACKUP_ENCRYPTION_KEY}
      - BACKUP_S3_BUCKET=${BACKUP_S3_BUCKET}
      - BACKUP_S3_ACCESS_KEY=${BACKUP_S3_ACCESS_KEY}
      - BACKUP_S3_SECRET_KEY=${BACKUP_S3_SECRET_KEY}
      - BACKUP_S3_ENDPOINT=${BACKUP_S3_ENDPOINT}
      - BACKUP_ALERT_WEBHOOK_URL=${BACKUP_ALERT_WEBHOOK_URL}
      - AWS_ACCESS_KEY_ID=${BACKUP_S3_ACCESS_KEY}
      - AWS_SECRET_ACCESS_KEY=${BACKUP_S3_SECRET_KEY}
      - AWS_DEFAULT_REGION=${BACKUP_S3_REGION:-us-east-1}
    volumes:
      - ./docker/backup:/scripts:ro
      - ./docker:/config/docker:ro
      - ./.env:/config/.env:ro
      - docker-compose.yml:/config/docker-compose.yml:ro
      - app_storage:/app/storage:ro
      - redis_data:/redis-data:ro
      - backup_data:/backups

volumes:
  postgres_data:
  redis_data:
  app_storage:
  backup_data:
